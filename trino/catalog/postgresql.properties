# PostgreSQL connector — points to moe-sovereign terra_checkpoints
# Schema: public (moe-sovereign tables), codex (moe-codex tables)
connector.name=postgresql
connection-url=jdbc:postgresql://terra_checkpoints:5432/${TRINO_PG_DB:-postgres}
connection-user=${TRINO_PG_USER:-postgres}
connection-password=${TRINO_PG_PASSWORD:-}
