# =============================================================================
#  moe-codex — EU-Sovereign Data & Audit Platform
#
#  Optional add-on to moe-sovereign. Provides:
#  - Apache NiFi (ETL fan-out)
#  - Marquez/OpenLineage (lineage tracking)
#  - lakeFS (git-style data versioning)
#  - codex-api (FastAPI backend exposing /v1/codex/*)
#
#  Requires moe-sovereign to be running so the external network and shared
#  infrastructure (Postgres, Valkey, MinIO) are available.
# =============================================================================

services:

  # ── codex-api — FastAPI backend ─────────────────────────────────────────────
  codex-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moe-codex-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${CODEX_HOST_PORT:-8090}:8090"
    depends_on:
      moe-opa:
        condition: service_healthy
      moe-mlflow:
        condition: service_healthy
      moe-marquez:
        condition: service_healthy
      moe-lakefs:
        condition: service_healthy
      moe-nifi:
        condition: service_healthy
      moe-trino:
        condition: service_healthy
      moe-docling:
        condition: service_healthy
    networks:
      - moe_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  # ── MLflow — Experiment Tracking & Model Registry ───────────────────────────
  moe-mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: moe-mlflow
    restart: unless-stopped
    entrypoint: /bin/sh
    command: >
      -c "pip install psycopg2-binary --quiet &&
      mlflow server
      --backend-store-uri postgresql://mlflow:${MLFLOW_DB_PASSWORD:-mlflow-changeme}@mlflow-postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5001"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:5001"
    depends_on:
      mlflow-postgres:
        condition: service_healthy
    networks:
      - moe_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:5001/health'); sys.exit(0 if r.status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  mlflow-postgres:
    image: postgres:16-alpine
    container_name: mlflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: "${MLFLOW_DB_PASSWORD:-mlflow-changeme}"
      POSTGRES_DB: mlflow
    volumes:
      - mlflow_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OPA — Open Policy Agent (access control) ────────────────────────────────
  moe-opa:
    image: openpolicyagent/opa:latest-debug
    container_name: moe-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    ports:
      - "${OPA_HOST_PORT:-8282}:8181"
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8181/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Apache NiFi — Data Flow Automation ──────────────────────────────────────
  # NiFi 1.14+ single-user-mode enforces HTTPS for /access/token. We therefore
  # disable HTTP and switch to HTTPS on port 8443 with the auto-generated
  # self-signed certificate. Codex talks to it via SOVEREIGN_VERIFY=False.
  moe-nifi:
    image: apache/nifi:1.27.0
    container_name: moe-nifi
    restart: unless-stopped
    environment:
      NIFI_WEB_HTTPS_HOST: "0.0.0.0"
      NIFI_WEB_HTTPS_PORT: "8443"
      NIFI_WEB_PROXY_HOST: "moe-nifi:8443,localhost:${NIFI_HOST_PORT:-8181}"
      SINGLE_USER_CREDENTIALS_USERNAME: "${NIFI_ADMIN_USER:-admin}"
      SINGLE_USER_CREDENTIALS_PASSWORD: "${NIFI_ADMIN_PASSWORD:-nifi-changeme-pwd}"
    ports:
      - "${NIFI_HOST_PORT:-8181}:8443"
    volumes:
      - nifi_data:/opt/nifi/nifi-current/data
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_logs:/opt/nifi/nifi-current/logs
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:8443/nifi/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 2G

  # ── Marquez PostgreSQL ──────────────────────────────────────────────────────
  # Note: marquez dev-config uses hardcoded literal `password: marquez` —
  # the password literal must equal "marquez" or the API container will fail
  # auth even with matching POSTGRES_PASSWORD. See enterprise_stack_quirks.
  marquez-postgres:
    image: postgres:16-alpine
    container_name: marquez-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: "${MARQUEZ_POSTGRES_PASSWORD:-marquez}"
      POSTGRES_DB: marquez
    volumes:
      - marquez_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez -d marquez"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Marquez API ─────────────────────────────────────────────────────────────
  moe-marquez:
    image: marquezproject/marquez:latest
    container_name: moe-marquez
    restart: unless-stopped
    environment:
      POSTGRES_HOST: marquez-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: "${MARQUEZ_POSTGRES_PASSWORD:-marquez}"
    ports:
      - "${MARQUEZ_HOST_PORT:-5000}:5000"
      - "${MARQUEZ_ADMIN_PORT:-5001}:5001"
    depends_on:
      marquez-postgres:
        condition: service_healthy
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/v1/namespaces -o /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

  # ── Marquez Web UI ──────────────────────────────────────────────────────────
  marquez-web:
    image: marquezproject/marquez-web:latest
    container_name: marquez-web
    restart: unless-stopped
    environment:
      MARQUEZ_HOST: moe-marquez
      MARQUEZ_PORT: "5000"
      WEB_PORT: "3000"
    ports:
      - "${MARQUEZ_WEB_PORT:-3030}:3000"
    depends_on:
      moe-marquez:
        condition: service_healthy
    networks:
      - moe_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── lakeFS PostgreSQL ───────────────────────────────────────────────────────
  lakefs-postgres:
    image: postgres:16-alpine
    container_name: lakefs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lakefs
      POSTGRES_PASSWORD: "${LAKEFS_DB_PASSWORD:-lakefs-changeme}"
      POSTGRES_DB: lakefs
    volumes:
      - lakefs_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakefs -d lakefs"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DocLing — Document Intelligence (parse PDF/DOCX/images → Markdown) ──────
  moe-docling:
    build:
      context: ./docling-service
      dockerfile: Dockerfile
    container_name: moe-docling
    restart: unless-stopped
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${DOCLING_HOST_PORT:-7080}:7080"
    networks:
      - moe_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:7080/health'); sys.exit(0 if r.status==200 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G

  # ── Trino — Distributed SQL Federation ─────────────────────────────────────
  moe-trino:
    image: trinodb/trino:426
    container_name: moe-trino
    restart: unless-stopped
    ports:
      - "${TRINO_HOST_PORT:-8080}:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── lakeFS — Data Version Control ───────────────────────────────────────────
  # Uses moe-storage (MinIO from moe-sovereign stack) as S3-compatible backend.
  # Note: lakeFS image has no curl — healthcheck uses wget. See enterprise_stack_quirks.
  moe-lakefs:
    image: treeverse/lakefs:latest
    container_name: moe-lakefs
    restart: unless-stopped
    command: ["run", "--local-settings"]
    environment:
      LAKEFS_BLOCKSTORE_TYPE: s3
      LAKEFS_BLOCKSTORE_S3_ENDPOINT: "${GARAGE_S3_ENDPOINT:-http://moe-storage-garage:3900}"
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID: "${GARAGE_ACCESS_KEY_ID}"
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY: "${GARAGE_SECRET_ACCESS_KEY}"
      LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE: "true"
      LAKEFS_BLOCKSTORE_S3_DISCOVER_BUCKET_REGION: "false"
      LAKEFS_DATABASE_TYPE: postgres
      LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING: "postgresql://lakefs:${LAKEFS_DB_PASSWORD:-lakefs-changeme}@lakefs-postgres:5432/lakefs"
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: "${LAKEFS_ENCRYPT_SECRET:-changeme-must-be-32bytes-long!!}"
      LAKEFS_INSTALLATION_USER_NAME: "${CODEX_ADMIN_USER:-admin}"
      LAKEFS_INSTALLATION_ACCESS_KEY_ID: "${LAKEFS_ACCESS_KEY_ID:-lakefs-access-key-changeme}"
      LAKEFS_INSTALLATION_SECRET_ACCESS_KEY: "${LAKEFS_SECRET_ACCESS_KEY:-lakefs-secret-key-changeme}"
    ports:
      - "${LAKEFS_HOST_PORT:-8010}:8000"
    depends_on:
      lakefs-postgres:
        condition: service_healthy
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8000/_health | grep -q 'alive!' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

# =============================================================================
volumes:
  nifi_data:
  nifi_conf:
  nifi_logs:
  marquez_db_data:
  lakefs_db_data:
  mlflow_artifacts:
  mlflow_db_data:

networks:
  # Joins the moe-sovereign network so codex services can reach
  # terra_checkpoints, terra_cache, and moe-storage.
  moe_net:
    name: moe-infra_default
    external: true
