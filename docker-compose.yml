# =============================================================================
#  moe-codex — EU-Sovereign Data & Audit Platform
#
#  Optional add-on to moe-sovereign. Provides:
#  - Apache NiFi (ETL fan-out)
#  - Marquez/OpenLineage (lineage tracking)
#  - lakeFS (git-style data versioning)
#  - codex-api (FastAPI backend exposing /v1/codex/*)
#
#  Requires moe-sovereign to be running so the external network and shared
#  infrastructure (Postgres, Valkey, MinIO) are available.
# =============================================================================

services:

  # ── codex-api — FastAPI backend ─────────────────────────────────────────────
  codex-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moe-codex-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${CODEX_HOST_PORT:-8090}:8090"
    depends_on:
      moe-opa:
        condition: service_healthy
      moe-mlflow:
        condition: service_healthy
      moe-marquez:
        condition: service_healthy
      moe-lakefs:
        condition: service_healthy
      moe-nifi:
        condition: service_healthy
      moe-trino:
        condition: service_healthy
      moe-docling:
        condition: service_healthy
    networks:
      - moe_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  # ── MLflow — Experiment Tracking & Model Registry ───────────────────────────
  moe-mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: moe-mlflow
    restart: unless-stopped
    entrypoint: /bin/sh
    command: >
      -c "pip install psycopg2-binary --quiet &&
      mlflow server
      --backend-store-uri postgresql://mlflow:${MLFLOW_DB_PASSWORD:-mlflow-changeme}@mlflow-postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5001"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:5001"
    depends_on:
      mlflow-postgres:
        condition: service_healthy
    networks:
      - moe_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:5001/health'); sys.exit(0 if r.status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  mlflow-postgres:
    image: postgres:16-alpine
    container_name: mlflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: "${MLFLOW_DB_PASSWORD:-mlflow-changeme}"
      POSTGRES_DB: mlflow
    volumes:
      - mlflow_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OPA — Open Policy Agent (access control) ────────────────────────────────
  moe-opa:
    image: openpolicyagent/opa:0.70.0-debug
    container_name: moe-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    ports:
      - "${OPA_HOST_PORT:-8282}:8181"
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8181/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Apache NiFi — Data Flow Automation ──────────────────────────────────────
  # NiFi 1.14+ single-user-mode enforces HTTPS for /access/token. We therefore
  # disable HTTP and switch to HTTPS on port 8443 with the auto-generated
  # self-signed certificate. Codex talks to it via SOVEREIGN_VERIFY=False.
  moe-nifi:
    image: apache/nifi:1.27.0
    container_name: moe-nifi
    restart: unless-stopped
    environment:
      NIFI_WEB_HTTPS_HOST: "0.0.0.0"
      NIFI_WEB_HTTPS_PORT: "8443"
      NIFI_WEB_PROXY_HOST: "moe-nifi:8443,localhost:${NIFI_HOST_PORT:-8181}"
      SINGLE_USER_CREDENTIALS_USERNAME: "${NIFI_ADMIN_USER:-admin}"
      SINGLE_USER_CREDENTIALS_PASSWORD: "${NIFI_ADMIN_PASSWORD:-nifi-changeme-pwd}"
    ports:
      - "${NIFI_HOST_PORT:-8181}:8443"
    volumes:
      - nifi_data:/opt/nifi/nifi-current/data
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_logs:/opt/nifi/nifi-current/logs
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:8443/nifi/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 2G

  # ── Marquez PostgreSQL ──────────────────────────────────────────────────────
  # Note: marquez dev-config uses hardcoded literal `password: marquez` —
  # the password literal must equal "marquez" or the API container will fail
  # auth even with matching POSTGRES_PASSWORD. See enterprise_stack_quirks.
  marquez-postgres:
    image: postgres:16-alpine
    container_name: marquez-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: "${MARQUEZ_POSTGRES_PASSWORD:-marquez}"
      POSTGRES_DB: marquez
    volumes:
      - marquez_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez -d marquez"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Marquez API ─────────────────────────────────────────────────────────────
  moe-marquez:
    image: marquezproject/marquez:0.50.0
    container_name: moe-marquez
    restart: unless-stopped
    environment:
      POSTGRES_HOST: marquez-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: "${MARQUEZ_POSTGRES_PASSWORD:-marquez}"
    ports:
      - "${MARQUEZ_HOST_PORT:-5000}:5000"
      - "${MARQUEZ_ADMIN_PORT:-5001}:5001"
    depends_on:
      marquez-postgres:
        condition: service_healthy
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/v1/namespaces -o /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

  # ── Marquez Web UI ──────────────────────────────────────────────────────────
  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    container_name: marquez-web
    restart: unless-stopped
    environment:
      MARQUEZ_HOST: moe-marquez
      MARQUEZ_PORT: "5000"
      WEB_PORT: "3000"
    ports:
      - "${MARQUEZ_WEB_PORT:-3030}:3000"
    depends_on:
      moe-marquez:
        condition: service_healthy
    networks:
      - moe_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── lakeFS PostgreSQL ───────────────────────────────────────────────────────
  lakefs-postgres:
    image: postgres:16-alpine
    container_name: lakefs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lakefs
      POSTGRES_PASSWORD: "${LAKEFS_DB_PASSWORD:-lakefs-changeme}"
      POSTGRES_DB: lakefs
    volumes:
      - lakefs_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakefs -d lakefs"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DocLing — Document Intelligence (parse PDF/DOCX/images → Markdown) ──────
  moe-docling:
    build:
      context: ./docling-service
      dockerfile: Dockerfile
    container_name: moe-docling
    restart: unless-stopped
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${DOCLING_HOST_PORT:-7080}:7080"
    networks:
      - moe_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:7080/health'); sys.exit(0 if r.status==200 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G

  # ── Trino — Distributed SQL Federation ─────────────────────────────────────
  moe-trino:
    image: trinodb/trino:426
    container_name: moe-trino
    restart: unless-stopped
    ports:
      - "${TRINO_HOST_PORT:-8080}:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── lakeFS — Data Version Control ───────────────────────────────────────────
  # Uses moe-storage (MinIO from moe-sovereign stack) as S3-compatible backend.
  # Note: lakeFS image has no curl — healthcheck uses wget. See enterprise_stack_quirks.
  moe-lakefs:
    image: treeverse/lakefs:1.35.0
    container_name: moe-lakefs
    restart: unless-stopped
    command: ["run", "--local-settings"]
    environment:
      LAKEFS_BLOCKSTORE_TYPE: s3
      LAKEFS_BLOCKSTORE_S3_ENDPOINT: "${GARAGE_S3_ENDPOINT:-http://moe-storage-garage:3900}"
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID: "${GARAGE_ACCESS_KEY_ID}"
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY: "${GARAGE_SECRET_ACCESS_KEY}"
      LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE: "true"
      LAKEFS_BLOCKSTORE_S3_DISCOVER_BUCKET_REGION: "false"
      LAKEFS_DATABASE_TYPE: postgres
      LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING: "postgresql://lakefs:${LAKEFS_DB_PASSWORD:-lakefs-changeme}@lakefs-postgres:5432/lakefs"
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: "${LAKEFS_ENCRYPT_SECRET:-changeme-must-be-32bytes-long!!}"
      LAKEFS_INSTALLATION_USER_NAME: "${CODEX_ADMIN_USER:-admin}"
      LAKEFS_INSTALLATION_ACCESS_KEY_ID: "${LAKEFS_ACCESS_KEY_ID:-lakefs-access-key-changeme}"
      LAKEFS_INSTALLATION_SECRET_ACCESS_KEY: "${LAKEFS_SECRET_ACCESS_KEY:-lakefs-secret-key-changeme}"
    ports:
      - "${LAKEFS_HOST_PORT:-8010}:8000"
    depends_on:
      lakefs-postgres:
        condition: service_healthy
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8000/_health | grep -q 'alive!' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Kestra pipeline builder ───────────────────────────────────────────────
  moe-kestra:
    image: kestra/kestra:latest
    container_name: moe-kestra
    command: server standalone
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://moe-kestra-db:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            basic-auth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: postgres
    volumes:
      - kestra_storage:/app/storage
    ports:
      - "${KESTRA_HOST_PORT:-8082}:8080"
    depends_on:
      moe-kestra-db:
        condition: service_healthy
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

  moe-kestra-db:
    image: postgres:16-alpine
    container_name: moe-kestra-db
    environment:
      POSTGRES_DB:       kestra
      POSTGRES_USER:     kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - kestra_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Budibase — Low-Code Workshop parity ─────────────────────────────────
  moe-budibase:
    image: budibase/budibase:3.4.20
    container_name: moe-budibase
    environment:
      BB_ADMIN_USER_EMAIL:    "${BUDIBASE_ADMIN_EMAIL:-admin@codex.local}"
      BB_ADMIN_USER_PASSWORD: "${BUDIBASE_ADMIN_PASS:-SovereignLCA!}"
      JWT_SECRET:             "${BUDIBASE_JWT_SECRET:-change-me-budibase-jwt}"
      ENCRYPTION_KEY:         "${BUDIBASE_ENCRYPTION_KEY:-change-me-encrypt}"
      SELF_HOSTED:            "1"
      REDIS_URL:              "redis://moe-budibase-redis:6379"
      REDIS_PASSWORD:         ""
    ports:
      - "${BUDIBASE_HOST_PORT:-10000}:80"
    depends_on:
      - moe-budibase-redis
    volumes:
      - budibase_data:/home/node/.config
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  moe-budibase-redis:
    image: redis:7-alpine
    container_name: moe-budibase-redis
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ── TimescaleDB — Time Series Catalog ────────────────────────────────────
  moe-timescaledb:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: moe-timescaledb
    environment:
      POSTGRES_DB:       timeseries
      POSTGRES_USER:     codex
      POSTGRES_PASSWORD: "${TIMESCALE_DB_PASSWORD:-timescale-changeme}"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex -d timeseries"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  moe-timescale-rest:
    image: postgrest/postgrest:v12.0.2
    container_name: moe-timescale-rest
    environment:
      PGRST_DB_URI:           "postgres://codex:${TIMESCALE_DB_PASSWORD:-timescale-changeme}@moe-timescaledb:5432/timeseries"
      PGRST_DB_SCHEMAS:       "codex"
      PGRST_DB_ANON_ROLE:     "codex"
      PGRST_OPENAPI_SERVER_PROXY_URI: "http://moe-timescale-rest:3000"
    ports:
      - "${TIMESCALE_REST_PORT:-3004}:3000"
    depends_on:
      moe-timescaledb:
        condition: service_healthy
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

  # ── HedgeDoc — Collaborative Notes / Reports ─────────────────────────────
  moe-hedgedoc:
    image: quay.io/hedgedoc/hedgedoc:latest
    container_name: moe-hedgedoc
    environment:
      CMD_DB_URL:             "postgres://hedgedoc:${HEDGEDOC_DB_PASSWORD:-hedgedoc-changeme}@moe-hedgedoc-db:5432/hedgedoc"
      CMD_DOMAIN:             "${HEDGEDOC_DOMAIN:-localhost}"
      CMD_URL_ADDPORT:        "false"
      CMD_PROTOCOL_USESSL:    "false"
      CMD_ALLOW_ANONYMOUS:    "true"
      CMD_ALLOW_ANONYMOUS_EDITS: "true"
      CMD_SESSION_SECRET:     "${HEDGEDOC_SESSION_SECRET:-change-me-hedgedoc-secret}"
      CMD_EMAIL:              "true"
      CMD_ALLOW_EMAIL_REGISTER: "true"
    ports:
      - "${HEDGEDOC_HOST_PORT:-3002}:3000"
    depends_on:
      moe-hedgedoc-db:
        condition: service_healthy
    volumes:
      - hedgedoc_uploads:/hedgedoc/public/uploads
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  moe-hedgedoc-db:
    image: postgres:16-alpine
    container_name: moe-hedgedoc-db
    environment:
      POSTGRES_DB:       hedgedoc
      POSTGRES_USER:     hedgedoc
      POSTGRES_PASSWORD: "${HEDGEDOC_DB_PASSWORD:-hedgedoc-changeme}"
    volumes:
      - hedgedoc_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hedgedoc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostGIS — Geospatial Investigation ───────────────────────────────────
  moe-postgis:
    image: postgis/postgis:16-3.4
    container_name: moe-postgis
    environment:
      POSTGRES_DB:       geodata
      POSTGRES_USER:     codex_geo
      POSTGRES_PASSWORD: "${POSTGIS_DB_PASSWORD:-postgis-changeme}"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex_geo -d geodata"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  moe-geo-rest:
    image: postgrest/postgrest:v12.0.2
    container_name: moe-geo-rest
    environment:
      PGRST_DB_URI:           "postgres://codex_geo:${POSTGIS_DB_PASSWORD:-postgis-changeme}@moe-postgis:5432/geodata"
      PGRST_DB_SCHEMAS:       "codex_geo"
      PGRST_DB_ANON_ROLE:     "codex_geo"
      PGRST_OPENAPI_SERVER_PROXY_URI: "http://moe-geo-rest:3000"
    ports:
      - "${GEO_REST_PORT:-3003}:3000"
    depends_on:
      moe-postgis:
        condition: service_healthy
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

  # ── Apache Superset — BI / Quiver parity ────────────────────────────────
  moe-superset:
    image: apache/superset:4.1.1
    container_name: moe-superset
    command:
      - /bin/sh
      - -c
      - |
        set -e
        superset db upgrade
        superset fab create-admin \
          --username "${SUPERSET_ADMIN_USER:-admin}" \
          --firstname Sovereign \
          --lastname Admin \
          --email "${SUPERSET_ADMIN_EMAIL:-admin@codex.local}" \
          --password "${SUPERSET_ADMIN_PASS:-SovereignBI!}" 2>/dev/null || true
        superset init
        exec gunicorn --bind 0.0.0.0:8088 --workers 2 --timeout 120 \
          'superset.app:create_app()'
    environment:
      SUPERSET_SECRET_KEY:    "${SUPERSET_SECRET_KEY:-change-me-superset-secret-key}"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://superset:superset@moe-superset-db:5432/superset"
      SUPERSET_LOAD_EXAMPLES:  "false"
      FLASK_ENV:               production
      # Allow embedding in the Codex admin UI
      WTF_CSRF_ENABLED:        "false"
      TALISMAN_ENABLED:        "false"
    ports:
      - "${SUPERSET_HOST_PORT:-8889}:8088"
    depends_on:
      moe-superset-db:
        condition: service_healthy
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  moe-superset-db:
    image: postgres:16-alpine
    container_name: moe-superset-db
    environment:
      POSTGRES_DB:       superset
      POSTGRES_USER:     superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    networks:
      - moe_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── OpenSearch — federated full-text search ──────────────────────────────
  moe-opensearch:
    image: opensearchproject/opensearch:2
    container_name: moe-opensearch
    environment:
      discovery.type:            single-node
      DISABLE_SECURITY_PLUGIN:   "true"
      OPENSEARCH_JAVA_OPTS:      "-Xms512m -Xmx512m"
      bootstrap.memory_lock:     "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_HOST_PORT:-9200}:9200"
    networks:
      - moe_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  moe-opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    container_name: moe-opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS:                      '["http://moe-opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN:    "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    depends_on:
      moe-opensearch:
        condition: service_healthy
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Falco — runtime security / threat detection ──────────────────────────
  moe-falco:
    image: falcosecurity/falco-no-driver:0.39.2
    container_name: moe-falco
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /dev:/host/dev:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - falco_rules:/etc/falco/rules.d
      - falco_events:/var/log/falco
    environment:
      FALCO_BPF_PROBE:     ""
    command: >
      falco
        --modern-bpf
        -o "json_output=true"
        -o "file_output.enabled=true"
        -o "file_output.filename=/var/log/falco/events.json"
        -o "http_output.enabled=false"
        --disable-cri-socket
    networks:
      - moe_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

